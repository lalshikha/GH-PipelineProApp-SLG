name: Test then Deploy GH-PipelineProApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Checkout Playwright test repository
        uses: actions/checkout@v4
        with:
          repository: lalshikha/SwagLabs-UiApi-BDD-PW-TS
          token: ${{ secrets.PRIVATE_REPO_PAT_SLG }}
          path: playwright-tests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies in test repo
        working-directory: playwright-tests
        run: npm install

      - name: Fix executable permissions
        working-directory: playwright-tests
        run: |
          chmod +x node_modules/.bin/playwright || true
          chmod +x node_modules/.bin/bddgen || true
          chmod +x node_modules/playwright/cli.js || true

      - name: Install Playwright browsers
        working-directory: playwright-tests
        run: node node_modules/playwright/cli.js install --with-deps chromium

      - name: Run BDD generation
        working-directory: playwright-tests
        env:
          ENV: dev
          APP_URL: ${{ vars.APP_URL }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          GOOGLE_URL: ${{ vars.GOOGLE_URL }}
          CI: true
        run: ./node_modules/.bin/bddgen

      - name: Run Playwright tests
        working-directory: playwright-tests
        env:
          ENV: dev
          APP_URL: https://example.invalid1.com
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          GOOGLE_URL: ${{ vars.GOOGLE_URL }}
          CI: true
        run: ./node_modules/.bin/playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-tests/playwright-report
            playwright-tests/reports
            playwright-tests/test-results
          if-no-files-found: ignore

  create-azure-devops-bug:
    runs-on: ubuntu-latest
    needs: run-playwright-tests
    if: ${{ always() && needs.run-playwright-tests.result == 'failure' }}

    steps:
      - name: Create Issue in Azure DevOps
        env:
          ADO_ORG: ${{ vars.ADO_ORG }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          ADO_PAT_SLG: ${{ secrets.ADO_PAT_SLG }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          URL="https://dev.azure.com/${ADO_ORG}/${ADO_PROJECT}/_apis/wit/workitems/\$Issue?api-version=7.1"
          echo "Calling URL: $URL"

          RESULT=$(curl --silent --show-error \
            --request POST \
            -u ":${ADO_PAT_SLG}" \
            --header "Content-Type: application/json-patch+json" \
            --url "$URL" \
            --data '[
              {
                "op": "add",
                "path": "/fields/System.Title",
                "value": "GitHub pipeline failure in '"${GITHUB_REPOSITORY_NAME}"'"
              },
              {
                "op": "add",
                "path": "/fields/System.Description",
                "value": "Playwright tests failed before deployment. GitHub Run ID: '"${GITHUB_RUN_ID}"'. Commit: '"${GITHUB_SHA}"'."
              }
            ]' \
            --write-out 'HTTPSTATUS:%{http_code}')

          BODY="${RESULT%HTTPSTATUS:*}"
          STATUS="${RESULT##*HTTPSTATUS:}"

          echo "$BODY"
          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: run-playwright-tests

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
